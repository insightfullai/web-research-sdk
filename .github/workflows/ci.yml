name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Static checks
        run: vp check

      - name: Unit tests
        run: vp run -r test

      - name: Build packages
        run: vp run -r build

      - name: Pack packages
        run: vp run -r pack

      - name: Verify package exports
        run: node ./scripts/verify-package-exports.mjs

      - name: Dry-run npm package contents
        run: corepack yarn pack:dry-run
